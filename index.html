<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Presensi Doremi Music Course</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
  background:
  linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.55)),
  url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1600&auto=format&fit=crop');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  padding:30px 15px;
}

/* overlay blur */

.bg-blur{
  position:fixed;
  inset:0;
  backdrop-filter:blur(4px);
  z-index:0;
}

.container{
  position:relative;
  z-index:2;
  max-width:560px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(18px);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.header{
  padding:32px 25px 24px;
  text-align:center;
  background:rgba(255,255,255,.05);
  border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
  width:70px;
  height:70px;
  margin:auto;
  margin-bottom:15px;
  border-radius:20px;
  background:linear-gradient(135deg,#f59e0b,#f97316);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.title{
  color:white;
  font-size:28px;
  font-weight:700;
}

.subtitle{
  color:rgba(255,255,255,.7);
  font-size:13px;
  margin-top:6px;
}

.form{
  padding:25px;
}

.section-title{
  color:white;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:18px;
  opacity:.8;
}

.field{
  margin-bottom:18px;
}

.field label{
  display:block;
  color:white;
  margin-bottom:8px;
  font-size:14px;
  font-weight:500;
}

.input,
.select,
.textarea{
  width:100%;
  padding:14px 15px;
  border-radius:14px;
  border:none;
  outline:none;
  background:rgba(255,255,255,.12);
  color:white;
  font-size:14px;
  border:1px solid rgba(255,255,255,.08);
}

.input::placeholder,
.textarea::placeholder{
  color:rgba(255,255,255,.55);
}

.select option{
  color:black;
}

.textarea{
  resize:none;
  min-height:90px;
}

.status-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.radio-box{
  position:relative;
}

.radio-box input{
  position:absolute;
  opacity:0;
}

.radio-box label{
  display:flex;
  justify-content:center;
  align-items:center;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  cursor:pointer;
  transition:.2s;
}

.radio-box input:checked + label{
  background:#ffffff;
  color:#111827;
  font-weight:600;
}

.upload{
  border:2px dashed rgba(255,255,255,.25);
  border-radius:18px;
  padding:25px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.upload input{
  position:absolute;
  inset:0;
  opacity:0;
  cursor:pointer;
}

.upload-icon{
  font-size:35px;
  margin-bottom:10px;
}

.upload-text{
  color:white;
  font-size:14px;
}

.upload-hint{
  color:rgba(255,255,255,.6);
  font-size:12px;
  margin-top:4px;
}

.preview{
  margin-top:10px;
  color:#86efac;
  font-size:13px;
}

.btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:15px;
  background:white;
  color:#111827;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
  margin-top:10px;
}

.btn:hover{
  transform:translateY(-2px);
}

.alert{
  display:none;
  margin-bottom:18px;
  padding:14px;
  border-radius:14px;
  font-size:14px;
}

.success{
  background:#dcfce7;
  color:#166534;
}

.error{
  background:#fee2e2;
  color:#991b1b;
}

.loading{
  opacity:.6;
  pointer-events:none;
}

.footer{
  text-align:center;
  color:rgba(255,255,255,.55);
  font-size:12px;
  padding:0 0 25px;
}

</style>
</head>
<body>

<div class="bg-blur"></div>

<div class="container">

<div class="card">

<div class="header">
<div class="logo">🎵</div>
<div class="title">Doremi</div>
<div class="subtitle">
Home Music Course — Presensi Siswa
</div>
</div>

<div class="form">

<div id="alertBox" class="alert"></div>

<div class="section-title">
Data Kehadiran
</div>

<form id="presensiForm">

<div class="field">
<label>Tanggal</label>
<input type="date" id="field-tanggal" class="input" required>
</div>

<div class="field">
<label>Nama Siswa</label>

<select id="field-nama" class="select" required>
<option value="">Pilih Nama Siswa</option>
</select>

</div>

<div class="field">

<label>Status Kehadiran</label>

<div class="status-grid">

<div class="radio-box">
<input type="radio" name="status" id="hadir" value="Hadir">
<label for="hadir">✅ Hadir</label>
</div>

<div class="radio-box">
<input type="radio" name="status" id="izin" value="Izin">
<label for="izin">📄 Izin</label>
</div>

<div class="radio-box">
<input type="radio" name="status" id="alpha" value="Alpha">
<label for="alpha">❌ Alpha</label>
</div>

</div>
</div>

<div class="field">
<label>Keterangan</label>

<textarea
id="field-keterangan"
class="textarea"
placeholder="Tambahkan catatan jika diperlukan..."
></textarea>

</div>

<div class="section-title">
Dokumentasi
</div>

<div class="field">

<label>Foto</label>

<div class="upload">

<input
type="file"
id="field-foto"
accept="image/*"
onchange="previewFile('foto')"
/>

<div class="upload-icon">📸</div>

<div class="upload-text">
Klik untuk upload foto
</div>

<div class="upload-hint">
JPG, PNG, WEBP
</div>

<div class="preview" id="foto-preview"></div>

</div>
</div>

<div class="field">

<label>Video</label>

<div class="upload">

<input
type="file"
id="field-video"
accept="video/*"
onchange="previewFile('video')"
/>

<div class="upload-icon">🎥</div>

<div class="upload-text">
Klik untuk upload video
</div>

<div class="upload-hint">
MP4, MOV
</div>

<div class="preview" id="video-preview"></div>

</div>
</div>

<button type="submit" class="btn" id="btnSubmit">
📤 Kirim Presensi
</button>

</form>

</div>

<div class="footer">
© Doremi Music Course
</div>

</div>
</div>

<script>

// ============================================
// URL GOOGLE APPS SCRIPT
// ============================================

const APPS_SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbx56_YrzJp5gtVXAAXd9S9xcaC-zxuDPJFzdekI0urxnZ1a_yrMyWWiCX65w35bN2hu/exec';

// ============================================

document.getElementById('field-tanggal').valueAsDate = new Date();

loadSiswa();

async function loadSiswa(){

  try{

    const res = await fetch(
      APPS_SCRIPT_URL + '?action=getSiswa'
    );

    const json = await res.json();

    const select = document.getElementById('field-nama');

    json.siswa.forEach(nama => {

      const option = document.createElement('option');

      option.value = nama;
      option.textContent = nama;

      select.appendChild(option);

    });

  }catch(err){

    console.log(err);

  }

}

function previewFile(type){

  const input = document.getElementById('field-' + type);

  const preview = document.getElementById(type + '-preview');

  if(input.files[0]){

    preview.innerHTML =
    '✅ ' + input.files[0].name;

  }

}

function showAlert(message,type){

  const box = document.getElementById('alertBox');

  box.style.display='block';

  box.className='alert ' + type;

  box.innerHTML=message;

}

function toBase64(file){

  return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload=()=>resolve(
      reader.result.split(',')[1]
    );

    reader.onerror=error=>reject(error);

  });

}

document
.getElementById('presensiForm')
.addEventListener('submit',submitForm);

async function submitForm(e){

  e.preventDefault();

  const btn =
  document.getElementById('btnSubmit');

  btn.classList.add('loading');

  btn.innerHTML='Mengirim...';

  try{

    const tanggal =
    document.getElementById('field-tanggal').value;

    const nama =
    document.getElementById('field-nama').value;

    const status =
    document.querySelector(
      'input[name="status"]:checked'
    )?.value;

    const keterangan =
    document.getElementById('field-keterangan').value;

    const foto =
    document.getElementById('field-foto').files[0];

    const video =
    document.getElementById('field-video').files[0];

    if(!status){

      showAlert(
        '❌ Pilih status kehadiran',
        'error'
      );

      btn.classList.remove('loading');

      btn.innerHTML='📤 Kirim Presensi';

      return;

    }

    const data = {
      tanggal,
      nama,
      status,
      keterangan
    };

    // FOTO

    if(foto){

      data.foto = await toBase64(foto);
      data.fotoName = foto.name;
      data.fotoMime = foto.type;

    }

    // VIDEO

    if(video){

      data.video = await toBase64(video);
      data.videoName = video.name;
      data.videoMime = video.type;

    }

    const response = await fetch(
      APPS_SCRIPT_URL,
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify(data)
      }
    );

    const result = await response.json();

    console.log(result);

    if(result.status === 'ok'){

      showAlert(
        '✅ Presensi berhasil dikirim',
        'success'
      );

      document
      .getElementById('presensiForm')
      .reset();

      document.getElementById(
        'field-tanggal'
      ).valueAsDate = new Date();

      document.getElementById(
        'foto-preview'
      ).innerHTML='';

      document.getElementById(
        'video-preview'
      ).innerHTML='';

    }else{

      showAlert(
        '❌ ' + result.message,
        'error'
      );

    }

  }catch(err){

    console.log(err);

    showAlert(
      '❌ Gagal mengirim data',
      'error'
    );

  }

  btn.classList.remove('loading');

  btn.innerHTML='📤 Kirim Presensi';

}

</script>

</body>
</html>
